server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression des assets.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Reverse-proxy de l'API vers le backend (même origine côté navigateur).
  # Les routes backend sont préfixées /api → on conserve le chemin.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # L'OCR peut envoyer des payloads de garanties ; marge confortable.
    client_max_body_size 12m;
  }

  # Cache long pour les assets fingerprintés de Vite.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA : toutes les autres routes retombent sur index.html (routing client).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# Lance l'application complète (frontend + backend) en une commande :
#   docker compose up --build
# Puis ouvrir http://localhost:8080
#
# Surcharger les secrets via un fichier .env à la racine (voir .env.example).

services:
  backend:
    build: ./server
    environment:
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DB_PATH: /app/data/tableau-de-garanti.db
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      # Extraction par modèle de vision (optionnel). Vide → OCR local.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      # E-mail + SMS patients (Brevo) — optionnel.
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_SENDER: ${EMAIL_SENDER:-}
      EMAIL_SENDER_NAME: ${EMAIL_SENDER_NAME:-Tableau de Garanti}
      SMS_SENDER: ${SMS_SENDER:-Cabinet}
      # Paiement en plusieurs fois (Alma / Klarna) — optionnel.
      ALMA_API_KEY: ${ALMA_API_KEY:-}
      ALMA_MODE: ${ALMA_MODE:-sandbox}
      KLARNA_USERNAME: ${KLARNA_USERNAME:-}
      KLARNA_PASSWORD: ${KLARNA_PASSWORD:-}
      KLARNA_REGION: ${KLARNA_REGION:-eu}
      KLARNA_MODE: ${KLARNA_MODE:-playground}
    volumes:
      - tdg-data:/app/data
    restart: unless-stopped
    healthcheck:
      # Node 22 expose fetch nativement (pas besoin de curl dans l'image).
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./app
      args:
        # URL de l'API côté navigateur : relative, proxyfiée par nginx.
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tdg-data:
